<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Mapa MVC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0d1117;overflow:hidden;font-family:'Courier New',monospace}
#bar{position:fixed;top:0;left:0;right:0;height:42px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:8px;padding:0 12px;z-index:50;flex-wrap:wrap}
#bar h1{font-size:12px;color:#58a6ff;font-weight:700;white-space:nowrap}
.btn{padding:3px 9px;border-radius:5px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:10px;cursor:pointer}
.btn:hover{background:#30363d}
.leg{display:flex;gap:6px;margin-left:auto;align-items:center;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:3px;font-size:8.5px;color:#8b949e}
.ld{width:9px;height:9px;border-radius:50%}
#svg-wrap{position:fixed;top:42px;left:0;right:0;bottom:24px}
svg{width:100%;height:100%;display:block}
#foot{position:fixed;bottom:0;left:0;right:0;height:24px;background:#161b22;border-top:1px solid #30363d;display:flex;align-items:center;padding:0 10px;font-size:8.5px;color:#8b949e;gap:10px}
#foot span{margin-left:auto}
#tip{position:fixed;display:none;background:#161b22;border:1px solid #30363d;border-radius:7px;padding:9px 12px;width:280px;font-size:10px;color:#e6edf3;line-height:1.5;box-shadow:0 6px 24px #000a;z-index:100;pointer-events:none}
#tip h3{font-size:11px;color:#fff;margin-bottom:2px}
#tip .ts{font-size:8px;color:#8b949e;margin-bottom:5px}
#tip pre{font-size:8.5px;color:#8b949e;white-space:pre-wrap;background:#0d1117;padding:5px 7px;border-radius:4px;border:1px solid #30363d;margin-bottom:5px}
#tip .ti{font-size:9.5px;color:#c9d1d9;margin-bottom:4px}
#tip .tr{font-size:8px;color:#58a6ff;white-space:pre-wrap}
#tip .tc{font-size:8px;color:#484f58;margin-top:4px}
</style>
</head>
<body>
<div id="bar">
  <h1>🗺 Mapa MVC — PW_Ejercicios</h1>
  <span style="font-size:9px;color:#8b949e">nacho · seba · janvera</span>
  <button class="btn" onclick="resetView()">Reset vista</button>
  <button class="btn" onclick="toggleLbl()">Etiquetas</button>
  <button class="btn" style="background:#1a3a1f;border-color:#2ea043;color:#56d364" onclick="saveLayout()">💾 Guardar JSON</button>
  <button class="btn" style="background:#1a2f60;border-color:#388bfd;color:#79c0ff" onclick="document.getElementById('fileIn').click()">📂 Cargar JSON</button>
  <input id="fileIn" type="file" accept=".json" style="display:none" onchange="loadLayout(event)"/>
  <div class="leg">
    <div class="li"><div class="ld" style="background:#388bfd"></div>Ctrl/Acción</div>
    <div class="li"><div class="ld" style="background:#3fb950"></div>Modelo/Prop</div>
    <div class="li"><div class="ld" style="background:#d29922"></div>Vista/Input</div>
    <div class="li"><div class="ld" style="background:#bc8cff"></div>ViewBag</div>
    <div class="li"><div class="ld" style="background:#8b949e"></div>Layout</div>
  </div>
</div>
<div id="svg-wrap">
  <svg id="S" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
        <path d="M100 0L0 0 0 100" fill="none" stroke="#161b22" stroke-width="0.5"/>
      </pattern>
      <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <polygon points="0 0, 7 3.5, 0 7" fill="currentColor"/>
      </marker>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)" id="bg"/>
    <g id="G">
      <g id="edges"></g>
      <g id="nodes"></g>
    </g>
  </svg>
</div>
<div id="foot">
  <span>🖱 Drag=mover · Rueda=zoom · Drag nodo=mover nodo · Click=info</span>
  <span id="sb"></span>
</div>
<div id="tip">
  <h3 id="t-title"></h3>
  <div class="ts" id="t-sub"></div>
  <pre id="t-code"></pre>
  <div class="ti" id="t-info"></div>
  <div class="tr" id="t-rels"></div>
  <div class="tc">Click de nuevo para cerrar</div>
</div>

const NS="http://www.w3.org/2000/svg";
function el(tag,attrs,par){
 const e=document.createElementNS(NS,tag);
 for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
 if(par)par.appendChild(e);
 return e;
}
function txt(str,x,y,fs,fill,par,fw){
 const t=el("text",{x,y,"text-anchor":"middle","dominant-baseline":"middle",
   "font-size":fs,fill,stroke:"none","font-family":"Courier New",
   "font-weight":fw||"bold"},par);
 t.textContent=str; return t;
}

// ── Build SVG ──────────────────────────────────────────────────────────────
let edgeEls={}, nodeEls={}, labelEls={};

function buildEdges(){
 const ec=document.getElementById("edges"); ec.innerHTML="";
 edgeEls={}; labelEls={};
 E.forEach((e,i)=>{
  const a=nm[e.s],b=nm[e.t]; if(!a||!b)return;
  const c=EC[e.tp]||"#555";
  const isDash=e.tp==="owns"||e.tp==="wraps";
  const g=el("g",{opacity:0.45},ec);
  const line=el("line",{stroke:c,"stroke-width":1.2,
    "stroke-dasharray":isDash?"6,4":"none",
    "marker-end":`url(#arr-${e.tp})`},g);
  // label bg+text
  const lg=el("g",{opacity:0,display:"none"},g);
  const lbg=el("rect",{fill:"#0d1117cc",rx:2},lg);
  const ltx=el("text",{x:0,y:0,"text-anchor":"middle","dominant-baseline":"middle",
    "font-size":9,fill:c,"font-family":"Courier New"},lg);
  ltx.textContent=e.lb;
  edgeEls[i]={g,line,lg,lbg,ltx,e};
  labelEls[i]=lg;
 });
 // Markers per color
 const defs=svg.querySelector("defs");
 Object.entries(EC).forEach(([tp,c])=>{
  if(defs.querySelector(`#arr-${tp}`))return;
  const m=el("marker",{id:`arr-${tp}`,markerWidth:7,markerHeight:7,
    refX:6,refY:3.5,orient:"auto"},defs);
  const p=el("polygon",{points:"0 0, 7 3.5, 0 7",fill:c},m);
 });
}

function buildNodes(){
 const nc=document.getElementById("nodes"); nc.innerHTML="";
 nodeEls={};
 N.forEach(n=>{
  const g2=GRP[n.g]||GRP.prop;
  const ng=el("g",{cursor:"pointer"},nc);
  ng.style.cursor="pointer";
  const circ=el("circle",{r:g2.r,fill:g2.fill,stroke:g2.stroke,"stroke-width":1.4},ng);
  // multiline label
  const lines=n.lb.split("\n");
  const fs=Math.max(6,Math.min(11,g2.r*0.28));
  const lh=fs*1.3;
  lines.forEach((l,i)=>{
   const t=el("text",{x:0,y:(-(lines.length-1)/2+i)*lh+fs*0.35,
    "text-anchor":"middle","dominant-baseline":"middle","font-size":fs,
    fill:g2.tc,"font-family":"Courier New","font-weight":"bold","stroke":"none"},ng);
   t.textContent=l;
  });
  ng.addEventListener("mouseenter",()=>{ if(!active||active.id!==n.id) setHov(n); });
  ng.addEventListener("mouseleave",()=>{ if(!active||active.id!==n.id) clearHov(); });
  ng.addEventListener("click",e=>{ e.stopPropagation(); onNodeClick(n,e); });
  // drag
  ng.addEventListener("pointerdown",e=>{ e.stopPropagation();
   const w=toWorld(e.clientX,e.clientY);
   dragN=n; dOff={x:w.x-pos[n.id].x,y:w.y-pos[n.id].y};
   ng.setPointerCapture(e.pointerId);
  });
  ng.addEventListener("pointermove",e=>{
   if(!dragN||dragN.id!==n.id)return;
   const w=toWorld(e.clientX,e.clientY);
   pos[n.id]={x:w.x-dOff.x,y:w.y-dOff.y};
   updatePositions();
  });
  ng.addEventListener("pointerup",()=>{ dragN=null; });
  nodeEls[n.id]={ng,circ,g2};
 });
}

// ── Transform helpers ──────────────────────────────────────────────────────
function svgPt(cx,cy){
 const r=svg.getBoundingClientRect();
 return{x:cx-r.left,y:cy-r.top};
}
function toWorld(cx,cy){
 const s=svgPt(cx,cy);
 return{x:(s.x-cam.x)/cam.sc,y:(s.y-cam.y)/cam.sc};
}

// ── Update positions ───────────────────────────────────────────────────────
function updatePositions(){
 // move node groups
 N.forEach(n=>{
  const el2=nodeEls[n.id]; if(!el2)return;
  el2.ng.setAttribute("transform",`translate(${pos[n.id].x},${pos[n.id].y})`);
 });
 // move edges
 Object.values(edgeEls).forEach(({line,lg,lbg,ltx,e})=>{
  const a=nm[e.s],b=nm[e.t]; if(!a||!b)return;
  const pa=pos[a.id],pb=pos[b.id];
  const ga=GRP[a.g]||GRP.prop, gb=GRP[b.g]||GRP.prop;
  const dx=pb.x-pa.x,dy=pb.y-pa.y,L=Math.sqrt(dx*dx+dy*dy);
  if(L<1)return;
  const ux=dx/L,uy=dy/L;
  const x1=pa.x+ux*ga.r,y1=pa.y+uy*ga.r;
  const x2=pb.x-ux*(gb.r+7),y2=pb.y-uy*(gb.r+7);
  line.setAttribute("x1",x1);line.setAttribute("y1",y1);
  line.setAttribute("x2",x2);line.setAttribute("y2",y2);
  const mx=(x1+x2)/2,my=(y1+y2)/2;
  ltx.setAttribute("x",mx);ltx.setAttribute("y",my);
  const tw=ltx.textContent.length*5.5+6;
  lbg.setAttribute("x",mx-tw/2);lbg.setAttribute("y",my-6);
  lbg.setAttribute("width",tw);lbg.setAttribute("height",12);
 });
}

// ── Camera transform ───────────────────────────────────────────────────────
function applyCam(){
 G.setAttribute("transform",`translate(${cam.x},${cam.y}) scale(${cam.sc})`);
 // update grid offset
 const gp=svg.querySelector("#grid");
 if(gp){
  gp.setAttribute("patternTransform",`translate(${cam.x%100*cam.sc},${cam.y%100*cam.sc}) scale(${cam.sc})`);
 }
}

// ── Highlight ──────────────────────────────────────────────────────────────
function setHov(n){ applyHL(n); }
function clearHov(){ if(!active)applyHL(null); }

function applyHL(n){
 const hiId=n?n.id:null;
 Object.values(nodeEls).forEach(({ng,circ,g2},i)=>{
  const nid=N.find(x=>nodeEls[x.id]===nodeEls[Object.keys(nodeEls)[i]])?.id;
 });
 // simpler: iterate by id
 N.forEach(nd=>{
  const el2=nodeEls[nd.id]; if(!el2)return;
  const isHi=hiId&&nd.id===hiId;
  const dim=hiId&&nd.id!==hiId;
  el2.ng.style.opacity=dim?"0.2":"1";
  el2.circ.setAttribute("stroke",isHi?"#fff":el2.g2.stroke);
  el2.circ.setAttribute("stroke-width",isHi?"2.5":"1.4");
 });
 Object.values(edgeEls).forEach(({g,lg,e})=>{
  const isHi=hiId&&(e.s===hiId||e.t===hiId);
  g.setAttribute("opacity",hiId?(isHi?"1":"0.06"):"0.45");
  lg.setAttribute("display",isHi&&showLbl?"":"none");
  lg.setAttribute("opacity",isHi?"1":"0");
 });
}

// ── Click ──────────────────────────────────────────────────────────────────
function onNodeClick(n,ev){
 if(active&&active.id===n.id){
  active=null; applyHL(null); hideTip(); return;
 }
 active=n; applyHL(n);
 const s=svgPt(ev.clientX,ev.clientY);
 showTip(n,ev.clientX,ev.clientY);
}
svg.addEventListener("click",()=>{active=null;applyHL(null);hideTip();});

// ── Tooltip ────────────────────────────────────────────────────────────────
function showTip(n,cx,cy){
 document.getElementById("t-title").textContent=n.lb.replace(/\n/g," ");
 document.getElementById("t-sub").textContent=`[${n.g}]  id: ${n.id}`;
 document.getElementById("t-code").textContent=n.code||"";
 document.getElementById("t-info").textContent=n.info||"";
 const rels=E.filter(e=>e.s===n.id||e.t===n.id);
 document.getElementById("t-rels").textContent=
  rels.map(e=>`${e.tp.padEnd(8)} ${e.s}→${e.t}  (${e.lb})`).join("\n");
 const tip=document.getElementById("tip");
 tip.style.display="block";
 let lx=cx+14, ly=cy-20;
 if(lx+290>window.innerWidth) lx=cx-300;
 if(ly+260>window.innerHeight) ly=window.innerHeight-265;
 if(ly<46) ly=46;
 tip.style.left=lx+"px"; tip.style.top=ly+"px";
}
function hideTip(){ document.getElementById("tip").style.display="none"; }

// ── Pan ────────────────────────────────────────────────────────────────────
let panStart=null;
svg.addEventListener("pointerdown",e=>{
 if(e.target.closest("g[cursor]"))return;
 panStart={sx:e.clientX,sy:e.clientY,cx:cam.x,cy:cam.y};
 svg.setPointerCapture(e.pointerId);
 svg.style.cursor="grabbing";
});
svg.addEventListener("pointermove",e=>{
 if(!panStart)return;
 cam.x=panStart.cx+(e.clientX-panStart.sx);
 cam.y=panStart.cy+(e.clientY-panStart.sy);
 applyCam();
});
svg.addEventListener("pointerup",()=>{panStart=null;svg.style.cursor="grab";});

// ── Wheel zoom ─────────────────────────────────────────────────────────────
svg.addEventListener("wheel",e=>{
 e.preventDefault();
 const r=svg.getBoundingClientRect();
 const sx=e.clientX-r.left,sy=e.clientY-r.top;
 const f=e.deltaY<0?1.13:0.88;
 const wx=(sx-cam.x)/cam.sc, wy=(sy-cam.y)/cam.sc;
 cam.sc=Math.max(0.05,Math.min(4,cam.sc*f));
 cam.x=sx-wx*cam.sc; cam.y=sy-wy*cam.sc;
 applyCam();
},{passive:false});

// ── Fit all ────────────────────────────────────────────────────────────────
function fitAll(){
 const wrap=document.getElementById("svg-wrap");
 const W=wrap.clientWidth||window.innerWidth;
 const H=wrap.clientHeight||(window.innerHeight-66);
 let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
 N.forEach(n=>{
  const g=GRP[n.g]||GRP.prop;
  x0=Math.min(x0,n.x-g.r);y0=Math.min(y0,n.y-g.r);
  x1=Math.max(x1,n.x+g.r);y1=Math.max(y1,n.y+g.r);
 });
 const pad=50;
 cam.sc=Math.min((W-pad*2)/(x1-x0),(H-pad*2)/(y1-y0),1.2);
 cam.x=W/2-(x0+x1)/2*cam.sc;
 cam.y=H/2-(y0+y1)/2*cam.sc;
 applyCam();
}

function resetView(){ active=null; applyHL(null); hideTip(); fitAll(); }
function toggleLbl(){ showLbl=!showLbl; applyHL(active); }

// ── Init ───────────────────────────────────────────────────────────────────
buildEdges();
buildNodes();
updatePositions();
document.getElementById("sb").textContent=`nodos: ${N.length} | aristas: ${E.length}`;
// Esperar a que el DOM tenga dimensiones reales
requestAnimationFrame(()=>requestAnimationFrame(fitAll));
window.addEventListener("resize",()=>{ if(!active)fitAll(); });

// ── Guardar / Cargar Layout JSON ───────────────────────────────────────────
function saveLayout(){
 const data={
  cam:{x:Math.round(cam.x*100)/100, y:Math.round(cam.y*100)/100, sc:Math.round(cam.sc*10000)/10000},
  nodes:{}
 };
 N.forEach(n=>{
  data.nodes[n.id]={x:Math.round(pos[n.id].x*10)/10, y:Math.round(pos[n.id].y*10)/10};
 });
 const json=JSON.stringify(data,null,2);
 const a=document.createElement("a");
 a.href="data:application/json;charset=utf-8,"+encodeURIComponent(json);
 a.download="mapa_mvc_layout.json";
 a.click();
 toast("💾 Layout guardado como mapa_mvc_layout.json");
}

function loadLayout(ev){
 const file=ev.target.files[0]; if(!file)return;
 const reader=new FileReader();
 reader.onload=e=>{
  try{
   const data=JSON.parse(e.target.result);
   // Cargar posiciones de nodos
   let loaded=0;
   if(data.nodes){
    Object.entries(data.nodes).forEach(([id,p])=>{
     if(pos[id]&&typeof p.x==="number"&&typeof p.y==="number"){
      pos[id]={x:p.x,y:p.y}; loaded++;
     }
    });
   }
   // Cargar cámara si existe
   if(data.cam&&typeof data.cam.sc==="number"){
    cam.x=data.cam.x; cam.y=data.cam.y; cam.sc=data.cam.sc;
    applyCam();
   }
   updatePositions();
   toast(`📂 Layout cargado · ${loaded}/${N.length} nodos restaurados`,"#58a6ff");
  }catch(err){
   toast("❌ Error al leer JSON: "+err.message,"#ff7b72");
  }
 };
 reader.readAsText(file);
 ev.target.value=""; // reset para poder cargar el mismo archivo otra vez
}

function toast(msg,color){
 color=color||"#56d364";
 const t=document.createElement("div");
 t.style.cssText=`position:fixed;bottom:34px;left:50%;transform:translateX(-50%);
  background:#161b22;border:1px solid ${color};color:${color};
  font-size:10px;font-family:'Courier New',monospace;
  padding:6px 14px;border-radius:6px;z-index:999;
  box-shadow:0 4px 16px #0008;pointer-events:none;
  opacity:1;transition:opacity .4s`;
 t.textContent=msg;
 document.body.appendChild(t);
 setTimeout(()=>{ t.style.opacity="0"; setTimeout(()=>t.remove(),400); },2600);
}
</script>
